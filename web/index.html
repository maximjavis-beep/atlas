            background: #f5f5f5;
        }

        .source-image img {
            width: 100%;
            max-height: 300px;
            height: auto;

            display: block;
            margin: 0 auto;
        }

        /* 文章内图片 - 响应式 */
        .article-image {
            margin: 10px 0;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            background: #f5f5f5;
        }
        .article-image img {
            width: 100%;
            height: auto;
            max-height: 250px;
            object-fit: contain;
            display: block;
        }
        
        /* 文章列表 */
        .article-list {
            list-style: none;
            padding: 0;
            margin: 15px 0 0 0;
        }
        .article-list li {
            padding: 10px 0;
            border-bottom: 1px solid #eee;
            color: #555;
            font-size: 0.95em;
        }
        .article-list li:last-child {
            border-bottom: none;
        }
        .article-title {
            color: #0f3460;
            text-decoration: none;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        .article-title:hover {
            color: #16213e;
            text-decoration: underline;
        }

            font-size: 0.9em;
            margin: 5px 0;

            border: none;
            border-top: 2px solid #e0e0e0;

            padding: 30px;

            .source-section { padding: 12px; margin-bottom: 15px; }
            .source-name { font-size: 1em; margin-bottom: 10px; padding-left: 8px; }
            
            /* 移动端图片 - 自适应 */
